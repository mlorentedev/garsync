services:
  garsync:
    build:
      context: .
      dockerfile: Dockerfile
    image: garsync:latest
    container_name: garsync
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - GARSYNC_DB_PATH=/app/data/garsync.db
      - TZ=UTC
    labels:
      com.garsync.description: "Garmin Sync Pipeline and Dashboard"
      com.garsync.version: "0.1.0"
